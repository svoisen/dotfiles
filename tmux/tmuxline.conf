# This tmux statusbar config was created by tmuxline.vim
# on Sun, 12 Jan 2025

set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#cad3f5,bg=#1e2030"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#1e2030"
set -g status-style "none,bg=#1e2030"
set -g message-style "fg=#cad3f5,bg=#1e2030"
set -g pane-border-style "fg=#1e2030"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#494d64,bg=#1e2030"
set -g status-left "#[fg=#1e2030,bg=#cad3f5] #S #[fg=#cad3f5,bg=#1e2030,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#cad3f5,bg=#1e2030] %Y-%m-%d  %H:%M #[fg=#cad3f5,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#1e2030,bg=#cad3f5] #h "
setw -g window-status-format "#[fg=#494d64,bg=#1e2030] #I #[fg=#494d64,bg=#1e2030] #W "
setw -g window-status-current-format "#[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]#[fg=#cad3f5,bg=#1e2030] #I #[fg=#cad3f5,bg=#1e2030] #W #[fg=#1e2030,bg=#1e2030,nobold,nounderscore,noitalics]"
